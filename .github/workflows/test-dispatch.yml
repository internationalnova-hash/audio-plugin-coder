name: Test Manual Dispatch

on:
  workflow_dispatch:
    inputs:
      test_input:
        description: 'Test input field'
        required: false
        default: 'hello'
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Echo input
        run: echo "Test input: ${{ github.event.inputs.test_input }}"
