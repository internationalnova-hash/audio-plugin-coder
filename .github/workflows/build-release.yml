name: Build & Publish Plugin

on:
  workflow_dispatch:
    inputs:
      plugin:
        description: 'Which plugin to build?'
        required: true
        type: choice
        options:
          - CloudWash
          - gnarly2
          - nf_gnarly
          - all
      platforms:
        description: 'Which platforms to build?'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - windows
          - macos
          - linux
      macos_vst3:
        description: 'macOS: Build VST3?'
        required: false
        default: true
        type: boolean
      macos_au:
        description: 'macOS: Build AU?'
        required: false
        default: true
        type: boolean
      macos_standalone:
        description: 'macOS: Build Standalone?'
        required: false
        default: false
        type: boolean

env:
  BUILD_TYPE: Release

jobs:
  # ============================================
  # RESOLVE PLUGIN MATRIX
  # ============================================
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set plugin matrix
        id: set-matrix
        run: |
          if [ "${{ inputs.plugin }}" == "all" ]; then
            echo 'matrix={"plugin":["CloudWash","gnarly2","nf_gnarly"]}' >> $GITHUB_OUTPUT
          else
            echo 'matrix={"plugin":["${{ inputs.plugin }}"]}' >> $GITHUB_OUTPUT
          fi

  # ============================================
  # WINDOWS BUILD
  # ============================================
  build-windows:
    needs: setup
    if: inputs.platforms == 'all' || inputs.platforms == 'windows'
    runs-on: windows-latest
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build VST3
        run: cmake --build build --config Release --target "${{ matrix.plugin }}_VST3"

      - name: Build Standalone
        run: cmake --build build --config Release --target "${{ matrix.plugin }}_Standalone"

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist
          find build -name "*.vst3" -exec cp -R {} dist/ \;
          find build -name "*.exe" -not -path "*/CMakeFiles/*" -exec cp {} dist/ \;
          echo "Collected:" && ls dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.plugin }}
          path: dist/
          if-no-files-found: error
          retention-days: 30

  # ============================================
  # MACOS BUILD
  # ============================================
  build-macos:
    needs: setup
    if: inputs.platforms == 'all' || inputs.platforms == 'macos'
    runs-on: macos-latest
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Dependencies
        run: brew install cmake || true

      - name: Configure CMake
        run: |
          cmake -S . -B build -G Xcode \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=10.13

      - name: Build VST3
        if: inputs.macos_vst3
        run: cmake --build build --config Release --target "${{ matrix.plugin }}_VST3"

      - name: Build AU
        if: inputs.macos_au
        run: cmake --build build --config Release --target "${{ matrix.plugin }}_AU"

      - name: Build Standalone
        if: inputs.macos_standalone
        run: cmake --build build --config Release --target "${{ matrix.plugin }}_Standalone"

      - name: Collect artifacts
        run: |
          mkdir -p dist
          find build -name "*.vst3" -exec cp -R {} dist/ \;
          find build -name "*.component" -exec cp -R {} dist/ \;
          find build -name "*.app" -not -path "*/CMakeFiles/*" -exec cp -R {} dist/ \;
          echo "Collected:" && ls dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.plugin }}
          path: dist/
          if-no-files-found: error
          retention-days: 30

  # ============================================
  # LINUX BUILD
  # ============================================
  build-linux:
    needs: setup
    if: inputs.platforms == 'all' || inputs.platforms == 'linux'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            libasound2-dev \
            libfreetype6-dev \
            libgl1-mesa-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libwebkit2gtk-4.1-dev \
            libjack-jackd2-dev \
            xvfb

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build VST3
        run: cmake --build build --target "${{ matrix.plugin }}_VST3"

      - name: Build LV2
        run: xvfb-run cmake --build build --target "${{ matrix.plugin }}_LV2"

      - name: Build Standalone
        run: xvfb-run cmake --build build --target "${{ matrix.plugin }}_Standalone"

      - name: Collect artifacts
        run: |
          mkdir -p dist
          find build -name "*.vst3" -exec cp -R {} dist/ \;
          find build -name "*.lv2" -exec cp -R {} dist/ \;
          find build -name "${{ matrix.plugin }}" -type f -exec cp {} dist/ \;
          echo "Collected:" && ls dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.plugin }}
          path: dist/
          if-no-files-found: error
          retention-days: 30

  # ============================================
  # PACKAGE RELEASE
  # ============================================
  package:
    needs: [setup, build-windows, build-macos, build-linux]
    if: always() && (needs.build-windows.result == 'success' || needs.build-macos.result == 'success' || needs.build-linux.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release archives
        run: |
          mkdir -p release
          shopt -s nullglob
          dirs=(artifacts/*/)
          if [ ${#dirs[@]} -eq 0 ]; then
            echo "No artifacts found to package."
            exit 0
          fi
          for dir in "${dirs[@]}"; do
            name=$(basename "$dir")
            zip -r "release/${name}.zip" "$dir"
            echo "Packaged: release/${name}.zip"
          done
          echo "Archives created:"
          ls -la release/

      - name: Upload release package
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ inputs.plugin }}
          path: release/
          if-no-files-found: warn
          retention-days: 30
