<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova Level — Meter Mockups</title>
  <style>
    body {
      background: #e7dfd0;
      font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif;
      color: #2f261f;
      margin: 0;
      padding: 0;
    }
    .mockup-container {
      display: flex;
      flex-wrap: wrap;
      gap: 38px;
      justify-content: center;
      align-items: flex-start;
      padding: 48px 0 32px 0;
    }
    .mockup {
      background: #f8f4ed;
      border-radius: 18px;
      box-shadow: 0 4px 18px rgba(90, 72, 46, 0.10);
      padding: 32px 28px 24px 28px;
      min-width: 220px;
      max-width: 260px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .mockup-title {
      font-size: 19px;
      font-weight: 800;
      letter-spacing: 0.11em;
      margin-bottom: 18px;
      color: #876739;
      text-align: center;
    }
    /* VU Needle Meter */
    .vu-needle {
      width: 180px;
      height: 90px;
      background: #f3e7d2;
      border-radius: 90px 90px 18px 18px / 90px 90px 12px 12px;
      border: 2px solid #b08f54;
      position: relative;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(176,143,84,0.08);
    }
    .vu-scale {
      position: absolute;
      left: 12px;
      right: 12px;
      top: 38px;
      height: 18px;
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #876739;
      opacity: 0.82;
    }
    .vu-needle-pointer {
      position: absolute;
      left: 50%;
      bottom: 18px;
      width: 4px;
      height: 54px;
      background: #b08f54;
      border-radius: 2px;
      transform: translateX(-50%) rotate(-32deg);
      transform-origin: bottom center;
      box-shadow: 0 0 6px #e8d8b2;
    }
    .vu-needle-center {
      position: absolute;
      left: 50%;
      bottom: 18px;
      width: 18px;
      height: 18px;
      background: #fff9f1;
      border: 2px solid #b08f54;
      border-radius: 50%;
      transform: translateX(-50%);
      z-index: 2;
    }
    /* Horizontal Bar Meter */
    .h-bar-bg {
      width: 160px;
      height: 22px;
      background: #e8d8b2;
      border-radius: 12px;
      position: relative;
      margin-bottom: 12px;
      box-shadow: 0 1px 4px #d8c28c44;
    }
    .h-bar-fill {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 70%;
      background: linear-gradient(90deg, #efd8a3 0%, #b8924e 100%);
      border-radius: 12px;
      box-shadow: 0 0 8px #d8c28c88;
      transition: width 0.3s cubic-bezier(0.18, 0.8, 0.2, 1);
    }
    /* Vertical Bar Meter */
    .v-bar-bg {
      width: 28px;
      height: 120px;
      background: #e8d8b2;
      border-radius: 14px;
      position: relative;
      margin-bottom: 12px;
      box-shadow: 0 1px 4px #d8c28c44;
      display: flex;
      align-items: flex-end;
    }
    .v-bar-fill {
      width: 100%;
      background: linear-gradient(180deg, #efd8a3 0%, #b8924e 100%);
      border-radius: 14px;
      box-shadow: 0 0 8px #d8c28c88;
      height: 65%;
      transition: height 0.3s cubic-bezier(0.18, 0.8, 0.2, 1);
    }
    /* LED Dot Meter */
    .led-row {
      display: flex;
      gap: 4px;
      margin-bottom: 12px;
    }
    .led-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #e8d8b2;
      box-shadow: 0 0 4px #d8c28c44;
      opacity: 0.5;
    }
    .led-dot.on {
      background: linear-gradient(180deg, #efd8a3 0%, #b8924e 100%);
      box-shadow: 0 0 8px #d8c28c88;
      opacity: 1;
    }
    /* Numeric Readout */
    .numeric {
      font-size: 32px;
      font-weight: 900;
      color: #b08f54;
      background: #fff9f1;
      border-radius: 10px;
      padding: 8px 22px;
      margin-bottom: 12px;
      box-shadow: 0 1px 4px #d8c28c44;
      letter-spacing: 0.04em;
    }
    /* Combined Meter */
    .combined {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
  </style>
</head>
<body>
  <h1 style="text-align:center; font-size:2.1em; font-weight:900; color:#876739; margin-top:32px; margin-bottom:18px; letter-spacing:0.09em;">Nova Level — Gain Reduction Meter Mockups</h1>
  <div class="mockup-container">
    <!-- VU Needle Meter -->
    <div class="mockup">
      <div class="mockup-title">VU Needle Meter</div>
      <div class="vu-needle">
        <div class="vu-scale">
          <span>0</span><span>-5</span><span>-10</span><span>-15</span><span>-20</span>
        </div>
        <div class="vu-needle-pointer" style="transform:translateX(-50%) rotate(-32deg);"></div>
        <div class="vu-needle-center"></div>
      </div>
    </div>
    <!-- Horizontal Bar Meter -->
    <div class="mockup">
      <div class="mockup-title">Horizontal Bar Meter</div>
      <div class="h-bar-bg">
        <div class="h-bar-fill"></div>
      </div>
    </div>
    <!-- Vertical Bar Meter -->
    <div class="mockup">
      <div class="mockup-title">Vertical Bar Meter</div>
      <div class="v-bar-bg">
        <div class="v-bar-fill"></div>
      </div>
    </div>
    <!-- LED Dot Meter -->
    <div class="mockup">
      <div class="mockup-title">LED Dot Meter</div>
      <div class="led-row">
        <div class="led-dot on"></div>
        <div class="led-dot on"></div>
        <div class="led-dot on"></div>
        <div class="led-dot on"></div>
        <div class="led-dot"></div>
        <div class="led-dot"></div>
        <div class="led-dot"></div>
        <div class="led-dot"></div>
      </div>
    </div>
    <!-- Numeric Readout -->
    <div class="mockup">
      <div class="mockup-title">Numeric Readout</div>
      <div class="numeric">-6.2 dB</div>
    </div>
    <!-- Combined Meter -->
    <div class="mockup">
      <div class="mockup-title">Combined Meter</div>
      <div class="combined">
        <div class="h-bar-bg" style="width:120px; margin-bottom:0;">
          <div class="h-bar-fill" style="width:60%;"></div>
        </div>
        <div class="numeric" style="font-size:22px; padding:4px 12px; margin-bottom:0;">-4.8 dB</div>
      </div>
    </div>
  </div>
</body>
</html>
