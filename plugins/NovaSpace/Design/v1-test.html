<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaSpace Preview</title>
    <style>
        :root {
            --bg-main: #efe6d8;
            --bg-panel: #fff9f1;
            --panel-shadow: rgba(76, 52, 24, 0.14);
            --text-primary: #20160d;
            --text-secondary: #6c5844;
            --accent-gold: #b98934;
            --accent-soft: #e3c27a;
            --accent-outline: #d9c9af;
            --accent-selected: #a5711e;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at top, rgba(255, 247, 234, 0.9), transparent 48%),
                linear-gradient(180deg, #f7f0e3 0%, #efe6d8 100%);
            font-family: "Avenir Next", "Segoe UI", sans-serif;
            color: var(--text-primary);
        }

        body {
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .shell {
            width: 820px;
            height: 560px;
            border-radius: 32px;
            padding: 28px;
            background: linear-gradient(180deg, rgba(255, 251, 245, 0.98), rgba(247, 238, 225, 0.98));
            box-shadow: 0 28px 60px var(--panel-shadow), inset 0 1px 0 rgba(255,255,255,0.8);
            border: 1px solid rgba(185, 137, 52, 0.22);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: end;
        }

        .title {
            font-family: Baskerville, "Palatino Linotype", serif;
            font-size: 30px;
            letter-spacing: 0.08em;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.18em;
        }

        .knob-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
        }

        .hero {
            flex: 1;
            display: grid;
            place-items: center;
        }

        .knob-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .knob-label, .mode-label {
            font-size: 11px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        .knob {
            border-radius: 50%;
            position: relative;
            background: radial-gradient(circle at 35% 30%, #fffef9 0%, #f6ead7 55%, #ebdcc5 100%);
            border: 1px solid rgba(185, 137, 52, 0.32);
            box-shadow: inset 0 2px 8px rgba(255,255,255,0.9), inset 0 -8px 18px rgba(128, 90, 28, 0.08), 0 10px 20px rgba(80, 53, 20, 0.12);
        }

        .knob::before {
            content: "";
            position: absolute;
            inset: 8%;
            border-radius: 50%;
            border: 8px solid transparent;
            border-top-color: var(--accent-gold);
            transform: rotate(var(--rotation, -120deg));
            transition: transform 140ms ease;
        }

        .knob.small { width: 112px; height: 112px; }
        .knob.large { width: 188px; height: 188px; }

        .value {
            font-variant-numeric: tabular-nums;
            font-size: 13px;
            color: var(--text-primary);
        }

        .modes {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .mode {
            border: 1px solid rgba(185, 137, 52, 0.24);
            border-radius: 18px;
            padding: 16px 14px;
            background: rgba(255, 250, 242, 0.92);
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-size: 12px;
        }

        .mode.active {
            background: linear-gradient(180deg, var(--accent-soft), var(--accent-gold));
            color: #fff8ef;
            box-shadow: 0 8px 18px rgba(165, 113, 30, 0.24);
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 6px;
            border-top: 1px solid rgba(185, 137, 52, 0.16);
            color: var(--text-secondary);
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="shell">
        <div class="header">
            <div>
                <div class="title">NOVA SPACE</div>
                <div class="subtitle" id="subtitle">Studio glow for modern vocals</div>
            </div>
            <div class="mode-label">White UI / Gold Hardware</div>
        </div>

        <div class="knob-row">
            <div class="knob-card"><div class="knob-label">Space</div><div class="knob small" id="space"></div><div class="value">45%</div></div>
            <div class="knob-card"><div class="knob-label">Air</div><div class="knob small" id="air"></div><div class="value">60%</div></div>
            <div class="knob-card"><div class="knob-label">Depth</div><div class="knob small" id="depth"></div><div class="value">40%</div></div>
            <div class="knob-card"><div class="knob-label">Mix</div><div class="knob small" id="mix"></div><div class="value">18%</div></div>
        </div>

        <div class="hero">
            <div class="knob-card">
                <div class="knob-label">Width</div>
                <div class="knob large" id="width"></div>
                <div class="value">80%</div>
            </div>
        </div>

        <div class="modes">
            <button class="mode active" data-mode="Studio">Studio</button>
            <button class="mode" data-mode="Arena">Arena</button>
            <button class="mode" data-mode="Dream">Dream</button>
            <button class="mode" data-mode="Vintage">Vintage</button>
        </div>

        <div class="footer">
            <span>Width is the hero control for vocal space placement.</span>
            <span id="modeCopy">Tight, polished, lead-vocal ambience.</span>
        </div>
    </div>

    <script>
        const rotations = { space: -10, air: 35, depth: -35, mix: -92, width: 68 };
        Object.entries(rotations).forEach(([id, value]) => {
            document.getElementById(id).style.setProperty("--rotation", `${value}deg`);
        });

        const copy = {
            Studio: ["Studio glow for modern vocals", "Tight, polished, lead-vocal ambience."],
            Arena: ["Wide modern lift with bigger walls", "Open, glossy, performance-sized space."],
            Dream: ["Soft bloom with long airy motion", "Diffuse ambient trail for cinematic vocals."],
            Vintage: ["Warm plate memory with golden decay", "Darker, richer, hardware-inspired tail."]
        };

        document.querySelectorAll('.mode').forEach((button) => {
            button.addEventListener('click', () => {
                document.querySelectorAll('.mode').forEach((node) => node.classList.remove('active'));
                button.classList.add('active');
                const [subtitle, description] = copy[button.dataset.mode];
                document.getElementById('subtitle').textContent = subtitle;
                document.getElementById('modeCopy').textContent = description;
            });
        });
    </script>
</body>
</html>
