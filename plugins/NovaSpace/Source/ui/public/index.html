<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Space</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 820px;
            height: 560px;
            font-family: "Avenir Next", "Segoe UI", sans-serif;
            user-select: none;
            overflow: hidden;
        }

        body {
            background: url('background.png') no-repeat center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .shell {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .header {
            position: absolute;
            top: 30px;
            left: 0;
            right: 0;
            text-align: center;
        }

        .title {
            font-size: 32px;
            letter-spacing: 0.12em;
            color: #b8860b;
            font-weight: bold;
        }

        .subtitle {
            font-size: 11px;
            letter-spacing: 0.1em;
            color: #888;
            margin-top: 4px;
        }

        .controls {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 40px;
        }

        .knob-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .knob {
            width: 100px;
            height: 100px;
            background-image: url('knob_generic.png');
            background-size: 100px 10000px;
            background-position: center top;
            cursor: ns-resize;
            touch-action: none;
            -webkit-user-drag: none;
            position: relative;
        }

        .knob.large {
            width: 140px;
            height: 140px;
            background-size: 140px 14000px;
        }

        .knob-label {
            font-size: 10px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #666;
        }

        .value {
            font-size: 12px;
            color: #333;
            font-weight: 500;
            min-width: 50px;
            text-align: center;
        }

        .hero {
            position: absolute;
            top: 220px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .stereo-meter {
            width: 200px;
            height: 8px;
            background-image: url('meters.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .modes {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 16px;
        }

        .mode-btn {
            width: 100px;
            height: 45px;
            border: none;
            cursor: pointer;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #333;
            text-shadow: 0 1px 1px rgba(255,255,255,0.8);
        }

        .mode-btn[data-mode="studio"] { background-image: url('studio_button_freeze_off.png'); }
        .mode-btn[data-mode="studio"].active { background-image: url('studio_button_freeze_on.png'); }

        .mode-btn[data-mode="arena"] { background-image: url('arena_button_freeze_off.png'); }
        .mode-btn[data-mode="arena"].active { background-image: url('arena_button_freeze_on.png'); }

        .mode-btn[data-mode="dream"] { background-image: url('dream_button_freeze_off.png'); }
        .mode-btn[data-mode="dream"].active { background-image: url('dream_button_freeze_on.png'); }

        .mode-btn[data-mode="vintage"] { background-image: url('vintage_button_freeze_off.png'); }
        .mode-btn[data-mode="vintage"].active { background-image: url('vintage_button_freeze_on.png'); }

        .footer {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            font-size: 12px;
            color: #888;
        }

        .mode-label {
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #b8860b;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="shell">
        <div class="header">
            <div class="title">NOVA SPACE</div>
            <div class="subtitle">REVERB BY INTERNATIONAL NOVA</div>
        </div>

        <div class="controls">
            <div class="knob-card">
                <div class="knob-label">Space</div>
                <div class="knob" id="space-knob" data-param="space"></div>
                <div class="value" id="space-value">3.5</div>
            </div>
            <div class="knob-card">
                <div class="knob-label">Air</div>
                <div class="knob" id="air-knob" data-param="air"></div>
                <div class="value" id="air-value">4.2</div>
            </div>
            <div class="knob-card">
                <div class="knob-label">Depth</div>
                <div class="knob" id="depth-knob" data-param="depth"></div>
                <div class="value" id="depth-value">2.8</div>
            </div>
            <div class="knob-card">
                <div class="knob-label">Mix</div>
                <div class="knob" id="mix-knob" data-param="mix"></div>
                <div class="value" id="mix-value">50 %</div>
            </div>
        </div>

        <div class="hero">
            <div class="knob-card">
                <div class="knob-label">Width</div>
                <div class="knob large" id="width-knob" data-param="width"></div>
                <div class="value" id="width-value">5.4</div>
            </div>
            <div class="stereo-meter"></div>
            <div class="mode-label">NOVA MODE</div>
        </div>

        <div class="modes">
            <button class="mode-btn active" data-mode="studio" data-mode-index="0">Studio</button>
            <button class="mode-btn" data-mode="arena" data-mode-index="1">Arena</button>
            <button class="mode-btn" data-mode="dream" data-mode-index="2">Dream</button>
            <button class="mode-btn" data-mode="vintage" data-mode-index="3">Vintage</button>
        </div>

        <div class="footer" id="modeDescription">Tight, polished, lead-vocal ambience.</div>
    </div>

    <script>
        /******************************************************************************
         * PART 1: Native Interop — DO NOT MODIFY
         ******************************************************************************/
        if (typeof window.__JUCE__ !== "undefined" && typeof window.__JUCE__.getAndroidUserScripts !== "undefined" && typeof window.inAndroidUserScriptEval === "undefined") {
            window.inAndroidUserScriptEval = true;
            eval(window.__JUCE__.getAndroidUserScripts());
            delete window.inAndroidUserScriptEval;
        }
        if (typeof window.__JUCE__ === "undefined") {
            window.__JUCE__ = { postMessage: function () { } };
        }
        if (typeof window.__JUCE__.initialisationData === "undefined") {
            window.__JUCE__.initialisationData = { __juce__platform: [], __juce__functions: [], __juce__registeredGlobalEventIds: [], __juce__sliders: [], __juce__toggles: [], __juce__comboBoxes: [] };
        }

        /******************************************************************************
         * PART 2: JUCE Bridge — DO NOT MODIFY
         ******************************************************************************/
        class ListenerList {
            constructor() { this.listeners = new Map(); this.listenerId = 0; }
            addListener(fn) { const id = this.listenerId++; this.listeners.set(id, fn); return id; }
            removeListener(id) { this.listeners.delete(id); }
            callListeners(payload) { for (const [, value] of this.listeners) value(payload); }
        }
        class EventListenerList {
            constructor() { this.eventListeners = new Map(); }
            addEventListener(eventId, fn) { if (!this.eventListeners.has(eventId)) this.eventListeners.set(eventId, new ListenerList()); return [eventId, this.eventListeners.get(eventId).addListener(fn)]; }
            removeEventListener([eventId, id]) { if (this.eventListeners.has(eventId)) this.eventListeners.get(eventId).removeListener(id); }
            emitEvent(eventId, object) { if (this.eventListeners.has(eventId)) this.eventListeners.get(eventId).callListeners(object); }
        }
        class Backend {
            constructor() { this.listeners = new EventListenerList(); }
            addEventListener(eventId, fn) { return this.listeners.addEventListener(eventId, fn); }
            removeEventListener([eventId, id]) { this.listeners.removeEventListener(eventId, id); }
            emitEvent(eventId, object) { window.__JUCE__.postMessage(JSON.stringify({ eventId: eventId, payload: object })); }
            emitByBackend(eventId, object) { this.listeners.emitEvent(eventId, JSON.parse(object)); }
        }
        if (typeof window.__JUCE__.backend === "undefined") window.__JUCE__.backend = new Backend();

        class SliderState {
            constructor(name) {
                this.name = name;
                this.identifier = "__juce__slider" + this.name;
                this.scaledValue = 0;
                this.properties = { start: 0, end: 1, skew: 1, name: "", label: "", numSteps: 100, interval: 0, parameterIndex: -1 };
                this.valueChangedEvent = new ListenerList();
                this.propertiesChangedEvent = new ListenerList();
                window.__JUCE__.backend.addEventListener(this.identifier, (e) => {
                    if (e.eventType === "valueChanged") { this.scaledValue = e.value; this.valueChangedEvent.callListeners(); }
                    if (e.eventType === "propertiesChanged") { let { eventType: _, ...rest } = e; this.properties = rest; this.propertiesChangedEvent.callListeners(); }
                });
                window.__JUCE__.backend.emitEvent(this.identifier, { eventType: "requestInitialUpdate" });
            }
            setNormalisedValue(v) {
                const interval = this.properties.interval;
                let scaled = Math.pow(v, 1 / this.properties.skew) * (this.properties.end - this.properties.start) + this.properties.start;
                if (interval !== 0) { const s = this.properties.start; scaled = Math.max(s, Math.min(this.properties.end, s + interval * Math.floor((scaled - s) / interval + 0.5))); }
                this.scaledValue = scaled;
                window.__JUCE__.backend.emitEvent(this.identifier, { eventType: "valueChanged", value: this.scaledValue });
            }
            sliderDragStarted() { window.__JUCE__.backend.emitEvent(this.identifier, { eventType: "sliderDragStarted" }); }
            sliderDragEnded()   { window.__JUCE__.backend.emitEvent(this.identifier, { eventType: "sliderDragEnded" }); }
            getNormalisedValue() { return Math.pow((this.scaledValue - this.properties.start) / (this.properties.end - this.properties.start), this.properties.skew); }
        }

        const _sliderStates = new Map();
        function getSliderState(name) {
            if (!_sliderStates.has(name)) _sliderStates.set(name, new SliderState(name));
            return _sliderStates.get(name);
        }

        /******************************************************************************
         * PART 3: Nova Space UI Logic
         ******************************************************************************/
        const modeCopy = {
            0: ["Studio glow for modern vocals",   "Tight, polished, lead-vocal ambience."],
            1: ["Wide modern lift with bigger walls", "Open, glossy, performance-sized space."],
            2: ["Soft bloom with long airy motion",  "Diffuse ambient trail for cinematic vocals."],
            3: ["Warm plate memory with golden decay", "Darker, richer, hardware-inspired tail."]
        };

        const sliderConfig = {
            space: { defaultValue: 0.45 },
            air:   { defaultValue: 0.60 },
            depth: { defaultValue: 0.40 },
            mix:   { defaultValue: 0.18 },
            width: { defaultValue: 0.80 }
        };

        function normalisedToRotation(value) { return -120 + value * 240; }

        function setKnobVisual(knob, valueNode, normalised) {
            // For image sprite: calculate frame offset
            const isLarge = knob.classList.contains('large');
            const spriteHeight = isLarge ? 14000 : 10000;  // Total sprite height
            const frameOffsetY = -(normalised * spriteHeight);
            knob.style.backgroundPosition = `center ${frameOffsetY}px`;
            valueNode.textContent = Math.round(normalised * 100) + "%";
        }

        function initKnob(paramName) {
            const state      = getSliderState(paramName);
            const knob       = document.getElementById(paramName + "-knob");
            const valueNode  = document.getElementById(paramName + "-value");
            const defaultVal = sliderConfig[paramName].defaultValue;

            let isDragging = false;
            let lastY = 0;

            function update() { setKnobVisual(knob, valueNode, state.getNormalisedValue()); }

            state.valueChangedEvent.addListener(update);
            update();

            knob.addEventListener("mousedown", function (e) {
                isDragging = true;
                lastY = e.clientY;
                state.sliderDragStarted();
                e.preventDefault();
            });

            document.addEventListener("mousemove", function (e) {
                if (!isDragging) return;
                const deltaY = lastY - e.clientY;
                lastY = e.clientY;
                const newNorm = Math.max(0, Math.min(1, state.getNormalisedValue() + deltaY * 0.005));
                state.setNormalisedValue(newNorm);
                setKnobVisual(knob, valueNode, newNorm);
            });

            document.addEventListener("mouseup", function (e) {
                if (!isDragging) return;
                isDragging = false;
                state.sliderDragEnded();
            });

            knob.addEventListener("wheel", function (e) {
                e.preventDefault();
                const step = e.deltaY > 0 ? -0.02 : 0.02;
                const newNorm = Math.max(0, Math.min(1, state.getNormalisedValue() + step));
                state.setNormalisedValue(newNorm);
                setKnobVisual(knob, valueNode, newNorm);
            }, { passive: false });

            knob.addEventListener("dblclick", function () {
                state.setNormalisedValue(defaultVal);
                setKnobVisual(knob, valueNode, defaultVal);
            });
        }

        function updateModeCopy(index) {
            var pair = modeCopy[index] || modeCopy[0];
            document.getElementById("modeSubtitle").textContent   = pair[0];
            document.getElementById("modeDescription").textContent = pair[1];
            document.querySelectorAll(".mode-btn").forEach(function (btn) {
                btn.classList.toggle("active", Number(btn.dataset.modeIndex) === index);
            });
        }

        function initModeButtons() {
            var modeState = getSliderState("nova_mode");

            function updateFromState() {
                updateModeCopy(Math.round(modeState.getNormalisedValue() * 3));
            }

            document.querySelectorAll(".mode-btn").forEach(function (btn) {
                btn.addEventListener("click", function () {
                    var index = Number(btn.dataset.modeIndex);
                    modeState.sliderDragStarted();
                    modeState.setNormalisedValue(index / 3);
                    modeState.sliderDragEnded();
                    updateModeCopy(index);
                });
            });

            modeState.valueChangedEvent.addListener(updateFromState);
            updateFromState();
        }

        document.addEventListener("DOMContentLoaded", function () {
            Object.keys(sliderConfig).forEach(initKnob);
            initModeButtons();
        });
    </script>
</body>
</html>
